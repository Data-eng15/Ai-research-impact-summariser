name: CI — Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend tests ─────────────────────────────────────────────────
  backend-test:
    name: Backend tests (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest httpx pytest-cov pytest-asyncio

      - name: Run backend tests
        env:
          GOOGLE_API_KEY: ""
          DEMO_MODE: "true"
        run: |
          cd backend
          pytest tests/ --cov=app --cov-report=term-missing -q

  # ── Frontend tests ────────────────────────────────────────────────
  frontend-test:
    name: Frontend tests (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type-check
        run: cd frontend && npx tsc --noEmit

      - name: Run frontend tests
        run: cd frontend && npm test -- --passWithNoTests

  # ── Docker build validation ───────────────────────────────────────
  docker-build:
    name: Docker build check
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t impact-lab-backend ./backend

      - name: Build frontend image
        run: docker build --build-arg VITE_API_URL=https://api.example.com -t impact-lab-frontend ./frontend
