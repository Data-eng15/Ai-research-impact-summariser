# ─────────────────────────────────────────────────────────────────────────────
# LOCAL DEVELOPMENT — docker-compose.yml
# Usage: docker compose up
# Hot reload is enabled for backend. Frontend runs via Vite dev server.
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:8080
    volumes:
      - ./backend/app:/app/app          # hot reload: code changes reflected immediately
      - ./backend/.data:/app/.data      # persist ChromaDB + SQLite between restarts
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  chroma_data:
